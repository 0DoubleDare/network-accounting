services:
  web:
    build: .
    user: "www-data"
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html/
    environment:
      - DB_HOST_PURE=db
  db:
    image: mariadb:11.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: network_accounting_db
    volumes:
      - db_data:/var/lib/mysql
      - ./install/network_accounting_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3307:3306"
volumes:
  db_data:
