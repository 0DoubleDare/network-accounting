services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html/
    environment:
      - DB_HOST_PURE=db
    depends_on:
      - db
  db:
    image: mysql:8.0
    command: >
      sh -c "sed 's/NO_AUTO_CREATE_USER//g' /docker-entrypoint-initdb.d/init.sql > /docker-entrypoint-initdb.d/00_fixed.sql
      && exec /usr/local/bin/docker-entrypoint.sh mysqld"
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: network_accounting_db
    volumes:
      - db_data:/var/lib/mysql
      - ./install/network_accounting_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3307:3306"
volumes:
  db_data: